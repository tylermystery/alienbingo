<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Bingo | The Truth Vault</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #39ff14; --verified: #ffd700; --debunked: #ff2a2a; --text: #e0e0e0; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Top Command Center (Toolbar) */
        #toolbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .branding { color: var(--accent); font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .toolbar-controls { display: flex; gap: 10px; align-items: center; }
        
        select.board-select { background: #000; color: var(--text); border: 1px solid var(--border); padding: 5px; font-family: inherit; }
        .btn { background: #111; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; font-size: 0.75rem; border-radius: 4px; }
        .btn:hover { background: rgba(57, 255, 20, 0.2); }
        .btn.locked { border-color: var(--debunked); color: var(--debunked); }
        
        /* Dropdown Menu */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #000; border: 1px solid var(--border); min-width: 120px; z-index: 200; box-shadow: 0px 8px 16px rgba(0,255,0,0.1); }
        .dropdown-content a { color: var(--text); padding: 10px; text-decoration: none; display: block; font-size: 0.75rem; cursor: pointer; }
        .dropdown-content a:hover { background-color: #222; color: var(--accent); }
        .dropdown:hover .dropdown-content { display: block; }

        /* Main Layout */
        #app-body { display: flex; flex-grow: 1; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 340px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .auth-box { margin-bottom: 15px; border: 1px solid #222; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 5px; }
        #user-info { font-size: 0.7rem; color: var(--accent); }
        h3 { color: var(--accent); font-size: 0.85rem; margin-bottom: 5px; letter-spacing: 1px; }
        
        .list-container { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px; }
        .list-container::-webkit-scrollbar { width: 5px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--border); }
        
        .search-controls { display: flex; gap: 5px; margin-bottom: 10px; }
        #search-bar { flex-grow: 1; padding: 8px; background: #000; border: 1px solid var(--border); color: var(--accent); box-sizing: border-box; font-family: inherit;}

        .theory-item { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 4px; border-left: 3px solid var(--accent); font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: grab;}
        .theory-item.proven-static { border-left-color: var(--verified); color: var(--verified); opacity: 0.8; cursor: default; }
        .theory-item.bet-prove { border-left-color: var(--accent); }
        .theory-item.bet-debunk { border-left-color: var(--debunked); color: #ff8888; }
        .theory-text { flex-grow: 1; padding-right: 10px; cursor: pointer; pointer-events: none; }

        /* Board Area */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background: radial-gradient(circle, #111 0%, #050505 100%); padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; max-width: 650px; padding: 15px; background: rgba(57, 255, 20, 0.05); border-radius: 10px; }
        .grid.locked { opacity: 0.9; pointer-events: none; }
        
        .slot { background: var(--panel); border: 1px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 5px; font-size: 0.6rem; transition: 0.3s; aspect-ratio: 1 / 1; overflow: hidden; position: relative; cursor: grab; }
        .slot:hover { border-color: #555; }
        .slot.drag-over { border-color: var(--accent); background: rgba(57, 255, 20, 0.1); transform: scale(0.98); }
        
        /* Slot Ghost (Undo feature) */
        .slot.ghost { border-style: dotted; border-color: #555; opacity: 0.5; cursor: pointer; }
        .slot.ghost::after { content: "Click to Undo"; position: absolute; font-size: 0.5rem; color: #888; bottom: 5px; }
        
        .slot-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; word-break: break-word; pointer-events: none; }
        
        .slot.filled { border-style: solid; border-color: #444; }
        .slot.bet-prove { border-color: var(--accent); color: var(--text); box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.1); }
        .slot.bet-prove::before { content: "PROVE"; position: absolute; top: 2px; left: 2px; font-size: 0.45rem; color: var(--accent); font-weight: bold; }
        .slot.bet-debunk { border-color: var(--debunked); color: var(--text); box-shadow: inset 0 0 10px rgba(255, 42, 42, 0.1); }
        .slot.bet-debunk::before { content: "HOAX"; position: absolute; top: 2px; left: 2px; font-size: 0.45rem; color: var(--debunked); font-weight: bold; }
        .free-space { color: var(--accent) !important; border: 1px solid var(--accent) !important; font-weight: bold; cursor: default; }
        .free-space::before { display: none; }

        @media (min-width: 600px) { .slot { font-size: 0.7rem; } }

        /* Truth Lens (Hover Tooltip) */
        #truth-lens { position: fixed; pointer-events: none; background: rgba(0, 0, 0, 0.9); border: 1px solid var(--accent); padding: 10px; color: #fff; font-size: 0.7rem; z-index: 1000; border-radius: 4px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); display: none; max-width: 250px; }
        .lens-title { color: var(--accent); font-weight: bold; margin-bottom: 5px; display: block;}
        .lens-desc { color: #aaa; }

        @media (max-width: 768px) {
            #app-body { flex-direction: column; overflow: auto; }
            #sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; padding: 15px; box-sizing: border-box;}
            .list-container { max-height: 200px; } 
            .toolbar-controls { flex-wrap: wrap; justify-content: flex-end;}
            #truth-lens { display: none !important; } /* Disable hover lens on mobile */
        }
    </style>
</head>
<body>

    <div id="truth-lens">
        <span class="lens-title" id="lens-title">Theory</span>
        <span class="lens-desc">Analyzing data streams... Click to deep dive.</span>
    </div>

    <header id="toolbar">
        <div class="branding">AlienBingo.wtf</div>
        <div class="toolbar-controls">
            <select id="board-profile" class="board-select" onchange="switchBoard()">
                <option value="alpha">Board: Alpha</option>
                <option value="beta">Board: Beta</option>
            </select>
            <button class="btn" onclick="randomizeBoard()">🎲 Shuffle</button>
            <button id="lock-btn" class="btn" onclick="toggleLock()">🔓 Unlocked</button>
            <button class="btn" onclick="shareBoard()">👽 Invite/Share</button>
            
            <div class="dropdown">
                <button class="btn">⋮</button>
                <div class="dropdown-content">
                    <a onclick="clearEntireBoard()">Clear Board</a>
                </div>
            </div>
        </div>
    </header>

    <div id="app-body">
        <aside id="sidebar">
            <div class="auth-box">
                <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleSignIn" data-auto_prompt="false"></div>
                <div class="g_id_signin" data-type="standard"></div>
                <div id="user-info">Status: Anonymous</div>
            </div>

            <h3>DECLASSIFIED (PROVEN)</h3>
            <div class="list-container" id="proven-list" style="max-height: 100px;">
                <span style="font-size:0.7rem; color:#666;">Decrypting...</span>
            </div>

            <h3>THE TRUTH VAULT</h3>
            <div class="search-controls">
                <input type="text" id="search-bar" placeholder="Search..." onkeyup="filterTheories()">
            </div>
            <div class="list-container" id="master-list">
                <span style="font-size:0.7rem; color:#666;">Decrypting...</span>
            </div>
        </aside>

        <main id="main-content">
            <div class="grid" id="bingo-grid"></div>
            <p style="font-size: 0.65rem; color: #666; margin-top:10px; text-align:center;">
                Drag to place/swap. Click theory to toggle bet. Dbl-click to remove.
            </p>
        </main>
    </div>

    <script>
        const CONFIG = { pat: "paty7GMTxGvGOn5mw.4cdc10ef2078c4975e3abf7f4ec245f0515b79136ea7a3f218a7e059b97c4121", baseId: "app7HPN2vsVVOUYaR", tableName: "MasterList" };
        let userEmail = null;
        let activeBoardId = 'alpha';
        let allTheories = [];
        let userBets = {}; 
        let isLocked = false;
        let ghostMemory = null; // Stores last cleared tile for Undo

        // Truth Lens Logic
        const lens = document.getElementById('truth-lens');
        const lensTitle = document.getElementById('lens-title');
        
        document.addEventListener('mousemove', (e) => {
            const target = e.target.closest('.theory-item, .slot.filled');
            if (target && !isLocked && target.dataset.theoryName) {
                lens.style.display = 'block';
                lens.style.left = (e.pageX + 15) + 'px';
                lens.style.top = (e.pageY + 15) + 'px';
                lensTitle.innerText = target.dataset.theoryName;
            } else {
                lens.style.display = 'none';
            }
        });

        // 1. Init Grid
        const grid = document.getElementById('bingo-grid');
        for (let i = 0; i < 25; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = i;
            
            if (i === 12) {
                slot.innerHTML = `<div class="slot-content">THEY ARE HERE</div>`;
                slot.classList.add('free-space', 'filled', 'bet-prove');
                slot.dataset.theoryName = "THEY ARE HERE";
            } else {
                slot.ondragover = e => { e.preventDefault(); if(!isLocked) slot.classList.add('drag-over'); };
                slot.ondragleave = () => slot.classList.remove('drag-over');
                slot.ondrop = handleDrop;
                slot.onclick = handleSlotClick;
                slot.ondblclick = triggerClearSlot;
                slot.draggable = true;
                slot.ondragstart = handleDragStart;
            }
            grid.appendChild(slot);
        }

        // 2. Airtable Fetch & Filter
        async function fetchTheories() {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${CONFIG.tableName}`, { headers: { Authorization: `Bearer ${CONFIG.pat}` } });
                const data = await response.json();
                allTheories = data.records.filter(r => r.fields.Name);
                if (getBoardTheories().length === 0) randomizeBoard();
                else renderSidebar();
            } catch (err) { console.error("Airtable Error", err); }
        }

        function filterTheories() { renderSidebar(); }

        function getBoardTheories() {
            return Array.from(document.querySelectorAll('.slot.filled')).map(s => s.dataset.theoryName).filter(n => n && n !== "THEY ARE HERE");
        }

        function renderSidebar() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const activeBoard = getBoardTheories();
            
            const provenList = document.getElementById('proven-list');
            const masterList = document.getElementById('master-list');
            provenList.innerHTML = '';
            masterList.innerHTML = '';

            let vaultTheories = allTheories.filter(r => r.fields.Status !== 'Verified');

            // Declassified
            allTheories.filter(r => r.fields.Status === 'Verified').forEach(record => {
                const name = record.fields.Name;
                provenList.innerHTML += `<div class="theory-item proven-static" data-theory-name="${name.replace(/"/g, '&quot;')}"><span class="theory-text">${name}</span></div>`;
            });

            // Vault
            vaultTheories.forEach(record => {
                const name = record.fields.Name;
                if (!activeBoard.includes(name) && name.toLowerCase().includes(query)) {
                    const betState = userBets[name] || 'prove';
                    const div = document.createElement('div');
                    div.className = `theory-item draggable bet-${betState}`;
                    div.draggable = true;
                    div.dataset.theoryName = name;
                    
                    div.innerHTML = `<div class="theory-text">${name}</div>`;
                    div.ondragstart = e => e.dataTransfer.setData("application/json", JSON.stringify({ source: 'vault', name: name }));
                    div.onclick = () => toggleGlobalBet(name); // Click sidebar to toggle bet
                    masterList.appendChild(div);
                }
            });
            
            // Re-bind deep dive logic to open google search on double click in sidebar (optional alternative to search icon)
            document.querySelectorAll('.theory-item').forEach(item => {
                item.ondblclick = () => window.open(`https://google.com/search?q=${encodeURIComponent(item.dataset.theoryName + " conspiracy theory")}`, '_blank');
            });
        }

        // 3. Interactions: Global Bets & Deep Dives
        function toggleGlobalBet(name) {
            if (isLocked) return;
            userBets[name] = userBets[name] === 'prove' ? 'debunk' : 'prove';
            
            const slot = Array.from(document.querySelectorAll('.slot')).find(s => s.dataset.theoryName === name);
            if (slot && !slot.classList.contains('free-space')) updateSlotUI(slot, name);
            
            saveState();
            renderSidebar();
        }

        function handleDragStart(e) {
            if (isLocked || !this.dataset.theoryName || this.classList.contains('free-space')) { e.preventDefault(); return; }
            e.dataTransfer.setData("application/json", JSON.stringify({ source: 'board', name: this.dataset.theoryName, originIndex: this.dataset.index }));
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (isLocked || this.classList.contains('free-space')) return;

            const data = JSON.parse(e.dataTransfer.getData("application/json"));
            
            if (data.source === 'board') {
                const originSlot = document.querySelector(`.slot[data-index='${data.originIndex}']`);
                const existingNameHere = this.dataset.theoryName;
                if (existingNameHere) updateSlotUI(originSlot, existingNameHere); 
                else clearSlotDOM(originSlot); 
            }
            
            if (!userBets[data.name]) userBets[data.name] = 'prove';
            updateSlotUI(this, data.name);
            ghostMemory = null; // Clear ghost on drop
            
            saveState();
            renderSidebar();
        }

        function handleSlotClick(e) {
            // If it's a ghost slot, Undo!
            if (this.classList.contains('ghost') && ghostMemory && ghostMemory.index === this.dataset.index) {
                updateSlotUI(this, ghostMemory.name);
                ghostMemory = null;
                saveState();
                renderSidebar();
                return;
            }
            // Deep dive on Shift+Click or double-click alternative handled via tooltip prompt
            if (this.dataset.theoryName && !this.classList.contains('free-space')) {
                 toggleGlobalBet(this.dataset.theoryName);
            }
        }

        function clearSlotDOM(slot) {
            slot.className = 'slot';
            slot.innerHTML = '';
            delete slot.dataset.theoryName;
        }

        function triggerClearSlot(e) {
            if (isLocked || this.classList.contains('free-space') || !this.dataset.theoryName) return;
            
            // Create Ghost Memory for Undo
            ghostMemory = { index: this.dataset.index, name: this.dataset.theoryName };
            
            clearSlotDOM(this);
            this.classList.add('ghost'); // Add ghost styling
            this.innerHTML = `<div class="slot-content">${ghostMemory.name}</div>`;
            
            saveState();
            renderSidebar();
            
            // Clear ghost after 4 seconds
            setTimeout(() => {
                if (this.classList.contains('ghost')) {
                    this.classList.remove('ghost');
                    this.innerHTML = '';
                }
            }, 4000);
        }

        function clearEntireBoard() {
            if(confirm("Erase all evidence and start a new board?")) {
                document.querySelectorAll('.slot').forEach(slot => {
                    if(!slot.classList.contains('free-space')) clearSlotDOM(slot);
                });
                saveState();
                renderSidebar();
            }
        }

        function updateSlotUI(slot, theoryName) {
            slot.classList.remove('ghost');
            const bet = userBets[theoryName] || 'prove';
            slot.dataset.theoryName = theoryName;
            slot.className = `slot filled bet-${bet}`;
            slot.innerHTML = `<div class="slot-content">${theoryName}</div>`;
        }

        // 4. Randomize & Tools
        function randomizeBoard() {
            if (isLocked) return;
            let available = allTheories.filter(t => t.fields.Status !== 'Verified').map(t => t.fields.Name);
            available.sort(() => Math.random() - 0.5); 
            
            const slots = document.querySelectorAll('.slot');
            let aIdx = 0;
            
            slots.forEach((slot, i) => {
                if (i === 12) return;
                if (aIdx < available.length) {
                    const tName = available[aIdx++];
                    if (!userBets[tName]) userBets[tName] = 'prove';
                    updateSlotUI(slot, tName);
                } else {
                    clearSlotDOM(slot);
                }
            });
            saveState();
            renderSidebar();
        }

        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lock-btn');
            const board = document.getElementById('bingo-grid');
            if (isLocked) { btn.innerText = "🔒 Locked"; btn.classList.add('locked'); board.classList.add('locked'); }
            else { btn.innerText = "🔓 Unlocked"; btn.classList.remove('locked'); board.classList.remove('locked'); }
        }

        function shareBoard() {
            const slots = Array.from(document.querySelectorAll('.slot'));
            let shareText = `My AlienBingo.wtf Predictions (${activeBoardId.toUpperCase()}) 👽\n\n`;
            for (let i = 0; i < 25; i++) {
                if (i === 12) shareText += "🟨"; 
                else if (slots[i].classList.contains('bet-prove')) shareText += "🟩";
                else if (slots[i].classList.contains('bet-debunk')) shareText += "🟥";
                else shareText += "⬛";
                if ((i + 1) % 5 === 0) shareText += "\n";
            }
            navigator.clipboard.writeText(shareText).then(() => alert("Grid copied! Share it to recruit others."));
        }

        // 5. State Management & Multiple Boards
        function switchBoard() {
            activeBoardId = document.getElementById('board-profile').value;
            hydrateState(userEmail || 'anon');
        }

        function saveState() {
            const boardState = Array.from(document.querySelectorAll('.slot')).map(s => s.classList.contains('free-space') ? null : (s.dataset.theoryName || ''));
            const fullKey = `state_${userEmail || 'anon'}_${activeBoardId}`;
            localStorage.setItem(fullKey, JSON.stringify({ board: boardState, bets: userBets }));
        }

        function hydrateState(email) {
            const fullKey = `state_${email}_${activeBoardId}`;
            const saved = localStorage.getItem(fullKey);
            
            if (!saved) {
                // If switching to a new blank board, clear existing UI
                document.querySelectorAll('.slot').forEach(s => { if(!s.classList.contains('free-space')) clearSlotDOM(s); });
                userBets = {};
                renderSidebar();
                return;
            }
            
            const state = JSON.parse(saved);
            userBets = state.bets || {};
            
            const slots = document.querySelectorAll('.slot');
            state.board.forEach((name, i) => {
                if (i === 12) return;
                if (name) updateSlotUI(slots[i], name);
                else clearSlotDOM(slots[i]);
            });
            renderSidebar();
        }

        function handleSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            document.getElementById('user-info').innerText = `ACCESS GRANTED: ${userEmail}`;
            hydrateState(userEmail);
        }

        // Init
        hydrateState('anon');
        fetchTheories();
    </script>
</body>
</html>
