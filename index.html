<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Bingo | The Truth Vault</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --accent: #39ff14; /* Alien Green */
            --verified: #ffd700; /* Gold */
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ROADMAP SECTION --- */
        #roadmap {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent);
            padding: 10px;
            font-size: 10px;
            z-index: 1000;
            max-width: 200px;
            display: none; /* Toggle this for dev */
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .auth-box { margin-bottom: 20px; }

        #master-list {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        .theory-item {
            background: #1a1a1a;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid var(--accent);
            cursor: grab;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .theory-item:hover { background: #222; }
        .theory-item.verified { border-left-color: var(--verified); color: var(--verified); }

        /* --- BINGO BOARD --- */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #111 0%, #050505 100%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            grid-template-rows: repeat(5, 120px);
            gap: 10px;
            padding: 20px;
            background: rgba(57, 255, 20, 0.05);
            border-radius: 10px;
        }

        .slot {
            background: var(--panel);
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            font-size: 0.7rem;
            transition: 0.3s;
            position: relative;
        }

        .slot.drag-over { border-color: var(--accent); background: rgba(57, 255, 20, 0.1); }
        .slot.filled { border-style: solid; }
        .slot.verified { 
            border-color: var(--verified); 
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.2);
            color: var(--verified);
        }

        .free-space { color: var(--accent); border: 1px solid var(--accent) !important; font-weight: bold; }
        
        h1 { margin: 0 0 20px 0; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="roadmap">
        <strong>V1 ROADMAP</strong><br>
        [X] Airtable Integration<br>
        [X] Drag & Drop UI<br>
        [ ] Google SSO Linkage<br>
        [ ] Proxy Server for PAT Protection<br>
        [ ] Mobile Responsiveness
    </div>

    <aside id="sidebar">
        <div class="auth-box">
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                 data-callback="handleSignIn">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <h3 style="color:var(--accent)">THE TRUTH LIST</h3>
        <div id="master-list">Loading the archives...</div>
    </aside>

    <main id="main-content">
        <h1>Alien Bingo</h1>
        <div class="grid" id="bingo-grid"></div>
    </main>

    <script>
        const CONFIG = {
            pat: "paty7GMTxGvGOn5mw.4cdc10ef2078c4975e3abf7f4ec245f0515b79136ea7a3f218a7e059b97c4121",
            baseId: "app7HPN2vsVVOUYaR", // Replace with actual Base ID if 'AlienBingo' is just the name
            tableName: "MasterList"
        };

        let userEmail = null;

        // 1. Initialize Board Slots
        const grid = document.getElementById('bingo-grid');
        for (let i = 0; i < 25; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (i === 12) {
                slot.innerText = "FREE SPACE: THEY ARE HERE";
                slot.classList.add('free-space', 'filled', 'verified');
            } else {
                slot.ondragover = e => { e.preventDefault(); slot.classList.add('drag-over'); };
                slot.ondragleave = () => slot.classList.remove('drag-over');
                slot.ondrop = handleDrop;
            }
            grid.appendChild(slot);
        }

        // 2. Fetch Master List from Airtable
        async function fetchTheories() {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${CONFIG.tableName}`, {
                    headers: { Authorization: `Bearer ${CONFIG.pat}` }
                });
                const data = await response.json();
                renderSidebar(data.records);
            } catch (err) {
                console.error("Airtable Connection Failed:", err);
                document.getElementById('master-list').innerText = "CONNECTION FAILED: SYSTEM OFFLINE";
            }
        }

        function renderSidebar(records) {
            const list = document.getElementById('master-list');
            list.innerHTML = '';
            records.forEach(record => {
                const fields = record.fields;
                const div = document.createElement('div');
                div.className = `theory-item ${fields.Status === 'Verified' ? 'verified' : ''}`;
                div.innerText = fields.Name;
                div.draggable = true;
                div.dataset.status = fields.Status;
                div.ondragstart = e => {
                    e.dataTransfer.setData("text", JSON.stringify({ name: fields.Name, status: fields.Status }));
                };
                list.appendChild(div);
            });
        }

        // 3. Drag and Drop Logic
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            const theory = JSON.parse(e.dataTransfer.getData("text"));
            
            this.innerText = theory.name;
            this.classList.add('filled');
            if (theory.status === 'Verified') this.classList.add('verified');
            else this.classList.remove('verified');
            
            saveBoardState();
        }

        // 4. Auth & Save
        function handleSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            alert(`Logged in as ${userEmail}. Your board is now syncing.`);
            // Future: fetchUserBoard(userEmail);
        }

        function saveBoardState() {
            if (!userEmail) {
                console.log("Local save: Sign in to sync to the cloud.");
                // For now, save to localStorage
                const boardData = Array.from(document.querySelectorAll('.slot')).map(s => s.innerText);
                localStorage.setItem('alien_bingo_local', JSON.stringify(boardData));
            }
        }

        // Run on load
        fetchTheories();
    </script>
</body>
</html>
