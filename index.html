<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Bingo | The Truth Vault</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #050505; --panel: #111; --panel-light: #1a1a1a; --accent: #39ff14; --verified: #ffd700; --debunked: #ff2a2a; --text: #e0e0e0; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Top Command Center */
        #toolbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .branding { color: var(--accent); font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .toolbar-controls { display: flex; gap: 10px; align-items: center; }
        
        select.board-select { background: #000; color: var(--text); border: 1px solid var(--border); padding: 5px; font-family: inherit; }
        .btn { background: #111; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; font-size: 0.75rem; border-radius: 4px; }
        .btn:hover { background: rgba(57, 255, 20, 0.2); }

        /* Main Edge-to-Edge Layout */
        #app-body { display: flex; flex-grow: 1; justify-content: center; align-items: center; background: radial-gradient(circle, #111 0%, #050505 100%); padding: 10px; overflow-y: auto; position: relative; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 800px; aspect-ratio: 1 / 1; padding: 10px; background: rgba(57, 255, 20, 0.03); border-radius: 10px; }
        
        .slot { background: var(--panel); border: 1px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8px; font-size: 0.7rem; transition: 0.2s; position: relative; cursor: pointer; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .slot:hover { border-color: #666; transform: scale(0.98); }
        
        /* Slot States */
        .slot-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; word-break: break-word; pointer-events: none; }
        .slot.filled { border-style: solid; border-color: #444; }
        
        .slot.bet-prove { border-color: var(--accent); color: var(--text); box-shadow: inset 0 0 15px rgba(57, 255, 20, 0.1); }
        .slot.bet-prove::before { content: "PROVE"; position: absolute; top: 3px; left: 3px; font-size: 0.45rem; color: var(--accent); font-weight: bold; }
        
        .slot.bet-debunk { border-color: var(--debunked); color: var(--text); box-shadow: inset 0 0 15px rgba(255, 42, 42, 0.1); }
        .slot.bet-debunk::before { content: "HOAX"; position: absolute; top: 3px; left: 3px; font-size: 0.45rem; color: var(--debunked); font-weight: bold; }
        
        .slot.ghost { border-style: dotted; border-color: #555; opacity: 0.5; }
        .slot.ghost::after { content: "GHOST"; position: absolute; font-size: 0.45rem; color: #888; bottom: 3px; left: 3px; }

        .free-space { color: var(--accent) !important; border: 1px solid var(--accent) !important; font-weight: bold; cursor: default; }
        .free-space::before { display: none; }

        .intel-badge { position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background-color: var(--debunked); border-radius: 50%; box-shadow: 0 0 8px var(--debunked); display: none; }
        .slot.has-intel .intel-badge { display: block; }

        /* Omni-Modal (Truth Dossier) */
        #dossier-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        #dossier-window { background: var(--panel); border: 1px solid var(--accent); width: 100%; max-width: 550px; max-height: 90vh; padding: 25px; border-radius: 8px; box-shadow: 0 0 30px rgba(57, 255, 20, 0.15); position: relative; display: flex; flex-direction: column; }
        
        #dossier-content { overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; line-height: 1.4; padding-right: 10px; flex-grow: 1; }
        #dossier-content::-webkit-scrollbar { width: 4px; }
        #dossier-content::-webkit-scrollbar-thumb { background: var(--accent); }
        
        .modal-section { margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
        .section-title { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .dossier-news { background: var(--panel-light); padding: 12px; border-left: 3px solid var(--verified); margin-top: 10px; font-size: 0.75rem; color: #ffd700; border-radius: 0 4px 4px 0;}

        /* Betting Action Buttons */
        .dossier-actions { display: flex; gap: 8px; margin-top: 15px; }
        .dossier-actions button { flex: 1; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; font-family: inherit;}
        .btn-prove { background: #000; border: 1px solid var(--accent); color: var(--accent); }
        .btn-hoax { background: #000; border: 1px solid var(--debunked); color: var(--debunked); }
        .btn-ghost { background: #000; border: 1px dashed #888; color: #888; }
        .btn-prove:hover { background: rgba(57, 255, 20, 0.2); }
        .btn-hoax:hover { background: rgba(255, 42, 42, 0.2); }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); }

        /* Global Consensus Bar */
        .consensus-container { margin-top: 15px; padding: 12px; background: #080808; border-radius: 6px; border: 1px solid #333; }
        .consensus-title { font-size: 0.65rem; color: #aaa; text-transform: uppercase; margin-bottom: 5px; text-align: center; letter-spacing: 1px;}
        .consensus-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; }
        .c-prove { background: var(--accent); transition: width 1s ease; }
        .c-hoax { background: var(--debunked); transition: width 1s ease; }
        .c-ghost { background: #555; transition: width 1s ease; }
        .consensus-stats { display: flex; justify-content: space-between; font-size: 0.65rem; margin-top: 5px; font-weight: bold;}

        /* Swap Pills */
        .swap-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .swap-pill { background: #000; border: 1px solid #444; color: #ccc; padding: 6px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .swap-pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(57,255,20,0.05); }
        .swap-icon { font-size: 0.8rem; }

        /* Whistleblower Input */
        .whistleblower-box { display: flex; gap: 8px; margin-top: 5px; }
        .whistleblower-box input { flex-grow: 1; background: #000; border: 1px solid #444; color: var(--text); padding: 8px 12px; border-radius: 4px; font-family: inherit; font-size: 0.75rem; }
        .whistleblower-box input:focus { outline: none; border-color: var(--accent); }

        .close-dossier { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .close-dossier:hover { color: var(--debunked); }

        @media (max-width: 768px) {
            #toolbar { padding: 10px; flex-wrap: wrap; }
            .branding { font-size: 1rem; }
            .grid { padding: 5px; gap: 4px; border-radius: 6px; }
            .slot { font-size: 0.55rem; padding: 4px; }
            #dossier-window { width: 95%; max-height: 95vh; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="dossier-modal">
        <div id="dossier-window">
            <button class="close-dossier" onclick="closeModal()">×</button>
            <div id="dossier-content">
                </div>
        </div>
    </div>

    <header id="toolbar">
        <div class="branding">AlienBingo</div>
        <div class="toolbar-controls">
            <select id="board-profile" class="board-select" onchange="switchBoard()">
                <option value="alpha">Alpha Board</option>
                <option value="beta">Beta Board</option>
            </select>
            <button class="btn" onclick="randomizeBoard()">🎲 Shuffle Board</button>
            <button class="btn" onclick="shareBoard()">📤 Share</button>
            <div id="g_id_onload" data-client_id="207125775312-s0hh1a7ojoh6jmu920oic88fn70bo24e.apps.googleusercontent.com" data-callback="handleSignIn" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-size="small"></div>
        </div>
    </header>

    <div id="app-body">
        <div class="grid" id="bingo-grid"></div>
    </div>

    <script>
        // Configuration
        const CONFIG = { pat: "paty7GMTxGvGOn5mw.4cdc10ef2078c4975e3abf7f4ec245f0515b79136ea7a3f218a7e059b97c4121", baseId: "app7HPN2vsVVOUYaR", tableName: "MasterList" };

        let userEmail = null;
        let activeBoardId = 'alpha';
        let allTheories = [];
        let theoryDataStore = {}; 
        let userBets = {}; 
        
        let activeDossierIndex = null;
        let activeDossierTheory = null;

        // 1. Init Grid
        const grid = document.getElementById('bingo-grid');
        for (let i = 0; i < 25; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = i;
            
            if (i === 12) {
                slot.innerHTML = `<div class="slot-content">THEY ARE HERE</div>`;
                slot.classList.add('free-space', 'filled', 'bet-prove');
                slot.dataset.theoryName = "THEY ARE HERE";
                slot.onclick = () => openOmniModal(i, "THEY ARE HERE");
            } else {
                slot.onclick = () => handleSlotClick(i); 
                const dot = document.createElement('div');
                dot.className = 'intel-badge';
                slot.appendChild(dot);
            }
            grid.appendChild(slot);
        }

        // 2. Fetch from Airtable (Runs once on load)
        async function fetchTheories() {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${CONFIG.baseId}/${CONFIG.tableName}`, { headers: { Authorization: `Bearer ${CONFIG.pat}` } });
                const data = await response.json();
                allTheories = data.records.filter(r => r.fields.Name);
                
                allTheories.forEach(r => {
                    theoryDataStore[r.fields.Name] = {
                        id: r.id,
                        status: r.fields.Status,
                        description: r.fields.Description,
                        latestIntel: r.fields.Latest_Intel,
                        updatedTime: r.fields.Last_Updated,
                        category: r.fields.Category || "Unclassified" 
                    };
                });

                if (getBoardTheories().length === 0) randomizeBoard();
                else hydrateGridUI();
            } catch (err) { console.error("Airtable Error", err); }
        }

        function getBoardTheories() {
            return Array.from(document.querySelectorAll('.slot[data-theory-name]')).map(s => s.dataset.theoryName).filter(n => n && n !== "THEY ARE HERE");
        }

        function handleSlotClick(index) {
            const slot = document.querySelector(`.slot[data-index='${index}']`);
            const nameHere = slot.dataset.theoryName;
            
            if (nameHere) {
                openOmniModal(index, nameHere);
            } else {
                const available = getVaultTheories();
                if(available.length > 0) openOmniModal(index, available[0]);
            }
        }

        // --- THE ZERO-LATENCY OMNI-MODAL LOGIC ---
        function openOmniModal(index, theoryName) {
            activeDossierIndex = index;
            activeDossierTheory = theoryName;
            
            const modal = document.getElementById('dossier-modal');
            modal.style.display = 'flex';
            
            renderModalContent(theoryName); // Loads instantly, no waiting!
        }

        function renderModalContent(theoryName) {
            const data = theoryDataStore[theoryName] || {};
            const lore = data.description || "Monitors active. Waiting for confirmed data leak.";
            const intel = data.latestIntel || "No anomalous chatter detected. Standby.";
            const cat = data.category || "Unclassified";
            const isFreeSpace = (theoryName === "THEY ARE HERE");
            const currentBet = userBets[theoryName];
            
            let html = `
                <h2 style="color:var(--accent); margin:0 0 5px 0;">${theoryName}</h2>
                <span style="background:#222; padding:3px 8px; border-radius:12px; font-size:0.65rem; color:#888;">TAG: ${cat.toUpperCase()}</span>
                
                <div class="modal-section" style="border:none; margin-top:10px; padding-top:0;">
                    <p style="font-size:0.85rem; line-height:1.5;">${lore}</p>
                    <div class="dossier-news">
                        <p style="color:#ffd700; margin:0 0 5px 0; text-transform:uppercase;"><strong>Latest Chatter (24h)</strong></p>
                        <p style="margin:0;">${intel}</p>
                    </div>
                </div>
            `;

            // ZONE 1: Bets & Consensus
            if (!isFreeSpace) {
                if (currentBet) {
                    // Generate pseudo-random consensus based on string length to keep it consistent per theory
                    const seed = theoryName.length;
                    const p = Math.max(10, (seed * 7) % 80); 
                    const h = Math.max(10, (seed * 11) % (100 - p));
                    const g = 100 - p - h;

                    html += `
                        <div class="consensus-container">
                            <div class="consensus-title">Global Network Consensus</div>
                            <div class="consensus-bar">
                                <div class="c-prove" style="width: ${p}%;"></div>
                                <div class="c-hoax" style="width: ${h}%;"></div>
                                <div class="c-ghost" style="width: ${g}%;"></div>
                            </div>
                            <div class="consensus-stats">
                                <span style="color:var(--accent)">PROVE: ${p}%</span>
                                <span style="color:var(--debunked)">HOAX: ${h}%</span>
                                <span style="color:#888">GHOST: ${g}%</span>
                            </div>
                        </div>
                        <div style="text-align:center; margin-top:10px;">
                            <button class="btn" style="border-color:#555; color:#aaa;" onclick="resetBet()">↺ Change Stance</button>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="dossier-actions">
                            <button class="btn-prove" onclick="submitBet('prove')">🟩 PROVE</button>
                            <button class="btn-hoax" onclick="submitBet('debunk')">🟥 HOAX</button>
                            <button class="btn-ghost" onclick="submitBet('ghost')">⬛ GHOST</button>
                        </div>
                    `;
                }
            }

            // ZONE 2 & 3: Swapping
            if (!isFreeSpace) {
                const onBoard = getBoardTheories();
                
                // Find Hot Variations (Same Category)
                const variations = allTheories
                    .filter(t => t.fields.Category === cat && t.fields.Name !== theoryName && !onBoard.includes(t.fields.Name))
                    .slice(0, 3);
                
                // Find Vault Trending (Any Category)
                const varNames = variations.map(v => v.fields.Name);
                const vault = allTheories
                    .filter(t => !onBoard.includes(t.fields.Name) && !varNames.includes(t.fields.Name) && t.fields.Name !== theoryName)
                    .sort(() => Math.random() - 0.5) 
                    .slice(0, 4);

                const escapeName = (name) => name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                if (variations.length > 0) {
                    html += `
                        <div class="modal-section">
                            <div class="section-title">Hot Variations (Swap)</div>
                            <div class="swap-list">
                                ${variations.map(v => `<div class="swap-pill" onclick="executeSwap('${escapeName(v.fields.Name)}')"><span class="swap-icon">↹</span> ${v.fields.Name}</div>`).join('')}
                            </div>
                        </div>
                    `;
                }

                if (vault.length > 0) {
                    html += `
                        <div class="modal-section">
                            <div class="section-title">Trending in the Vault (Swap)</div>
                            <div class="swap-list">
                                ${vault.map(v => `<div class="swap-pill" onclick="executeSwap('${escapeName(v.fields.Name)}')"><span class="swap-icon">↹</span> ${v.fields.Name}</div>`).join('')}
                            </div>
                        </div>
                    `;
                }

                // ZONE 4: Whistleblower
                html += `
                    <div class="modal-section">
                        <div class="section-title">Declassify Custom Intel</div>
                        <div class="whistleblower-box">
                            <input type="text" id="custom-theory-input" placeholder="e.g., Subterranean Lizard People" autocomplete="off">
                            <button class="btn" onclick="submitCustomTheory()">+ Add</button>
                        </div>
                    </div>
                `;
            }

            document.getElementById('dossier-content').innerHTML = html;
        }

        // --- OMNI-MODAL ACTIONS ---
        function submitBet(betState) {
            if(!activeDossierTheory) return;
            userBets[activeDossierTheory] = betState;
            const slot = document.querySelector(`.slot[data-index='${activeDossierIndex}']`);
            if (slot) updateSlotUI(slot, activeDossierTheory);
            saveState();
            renderModalContent(activeDossierTheory); // Re-render to show Consensus!
        }

        function resetBet() {
            if(!activeDossierTheory) return;
            delete userBets[activeDossierTheory];
            const slot = document.querySelector(`.slot[data-index='${activeDossierIndex}']`);
            if (slot) updateSlotUI(slot, activeDossierTheory); // Will fall back to default styling
            saveState();
            renderModalContent(activeDossierTheory); // Re-render to show Buttons
        }

        function executeSwap(newTheoryName) {
            const slot = document.querySelector(`.slot[data-index='${activeDossierIndex}']`);
            if (!userBets[newTheoryName]) userBets[newTheoryName] = 'prove'; 
            
            updateSlotUI(slot, newTheoryName);
            saveState();
            openOmniModal(activeDossierIndex, newTheoryName);
        }

        function submitCustomTheory() {
            const input = document.getElementById('custom-theory-input');
            const newTheory = input.value.trim();
            if (!newTheory) return;

            // Instantly create local data for the MVP
            const fakeData = {
                id: 'temp_' + Date.now(),
                status: 'Unverified',
                description: 'User-submitted intel. Awaiting AI synopsis and verification.',
                latestIntel: 'Monitoring secure channels...',
                category: 'User Custom'
            };
            
            theoryDataStore[newTheory] = fakeData;
            allTheories.push({ fields: { Name: newTheory, Category: 'User Custom' } });
            
            executeSwap(newTheory);
        }

        function closeModal() { 
            document.getElementById('dossier-modal').style.display = 'none'; 
            activeDossierIndex = null;
            activeDossierTheory = null;
        }

        // --- GRID UI & STATE CONTROLS ---
        function getVaultTheories() {
            const onBoard = getBoardTheories();
            return allTheories.map(t => t.fields.Name).filter(n => !onBoard.includes(n));
        }

        function updateSlotUI(slot, theoryName) {
            const bet = userBets[theoryName]; // Notice: No longer defaults to 'prove' to force user choice
            slot.dataset.theoryName = theoryName;
            
            let badgeHTML = '<div class="intel-badge"></div>';
            
            if (!bet) slot.className = `slot filled`; // Neutral state before betting
            else if (bet === 'ghost') slot.className = `slot ghost`;
            else slot.className = `slot filled bet-${bet}`;
            
            slot.innerHTML = `${badgeHTML}<div class="slot-content">${theoryName}</div>`;
            checkIntelBadge(slot, theoryName);
        }

        function checkIntelBadge(slot, theoryName) {
            const data = theoryDataStore[theoryName];
            if(!data || !data.updatedTime) return;
            const hours = (new Date() - new Date(data.updatedTime)) / (1000 * 60 * 60);
            if(hours < 24) slot.classList.add('has-intel');
            else slot.classList.remove('has-intel');
        }

        function hydrateGridUI() {
            document.querySelectorAll('.slot[data-theory-name]').forEach(slot => {
                if(!slot.classList.contains('free-space')) {
                    checkIntelBadge(slot, slot.dataset.theoryName);
                }
            });
        }

        function randomizeBoard() {
            let available = getVaultTheories();
            available.sort(() => Math.random() - 0.5); 
            
            const slots = document.querySelectorAll('.slot');
            let aIdx = 0;
            slots.forEach((slot, i) => {
                if (i === 12) return;
                if (aIdx < available.length) {
                    const tName = available[aIdx++];
                    updateSlotUI(slot, tName);
                } else {
                    slot.className = 'slot'; 
                    slot.innerHTML = '<div class="intel-badge"></div>'; 
                    delete slot.dataset.theoryName;
                }
            });
            saveState();
        }

        function switchBoard() { activeBoardId = document.getElementById('board-profile').value; hydrateState(userEmail || 'anon'); }

        function saveState() {
            const boardState = Array.from(document.querySelectorAll('.slot')).map(s => s.classList.contains('free-space') ? null : (s.dataset.theoryName || ''));
            const fullKey = `state_${userEmail || 'anon'}_${activeBoardId}`;
            localStorage.setItem(fullKey, JSON.stringify({ board: boardState, bets: userBets }));
        }

        function hydrateState(email) {
            const fullKey = `state_${email}_${activeBoardId}`;
            const saved = localStorage.getItem(fullKey);
            
            if (!saved) {
                document.querySelectorAll('.slot').forEach(s => { 
                    if(!s.classList.contains('free-space')) {
                        s.className = 'slot'; 
                        s.innerHTML = '<div class="intel-badge"></div>'; 
                        delete s.dataset.theoryName;
                    }
                });
                userBets = {}; 
                return;
            }
            
            const state = JSON.parse(saved);
            userBets = state.bets || {};
            const slots = document.querySelectorAll('.slot');
            state.board.forEach((name, i) => {
                if (i === 12) return;
                if (name) updateSlotUI(slots[i], name);
                else {
                    slots[i].className = 'slot'; 
                    slots[i].innerHTML = '<div class="intel-badge"></div>'; 
                    delete slots[i].dataset.theoryName;
                }
            });
        }

        function shareBoard() {
            const slots = Array.from(document.querySelectorAll('.slot'));
            let shareText = `My AlienBingo.wtf Predictions (${activeBoardId.toUpperCase()}) 👽\n\n`;
            for (let i = 0; i < 25; i++) {
                if (i === 12) shareText += "🟨"; 
                else if (slots[i].classList.contains('bet-prove')) shareText += "🟩";
                else if (slots[i].classList.contains('bet-debunk')) shareText += "🟥";
                else shareText += "⬛"; 
                if ((i + 1) % 5 === 0) shareText += "\n";
            }
            navigator.clipboard.writeText(shareText).then(() => alert("Grid copied! Share it to recruit others."));
        }

        function handleSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            hydrateState(userEmail);
        }

        // Initialize
        hydrateState('anon'); 
        fetchTheories();
    </script>
</body>
</html>
